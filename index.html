<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bossraid</title>
    <style>
      :root {
        --bg: #0c0d14;
        --panel: #14161f;
        --accent: #ffcc55;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: #e8e8f0;
        font-family: 'Trebuchet MS', system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        background: #0a0b11;
        border: 2px solid #2a2d3a;
        border-radius: 8px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
        max-width: 100%;
        max-height: 100%;
        image-rendering: optimizeQuality;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="960" height="600"></canvas>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
